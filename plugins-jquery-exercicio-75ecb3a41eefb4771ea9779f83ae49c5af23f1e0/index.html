<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EBAC Motors</title>

    <link rel="stylesheet" href="./lib/slick/slick.css">
    <link rel="stylesheet" href="./lib/slick/slick-theme.css">
    <link rel="stylesheet" href="./main.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>EBAC Motors</h1>
        </div>
    </header>

    <div class="carousel-imagens">
        <img src="./images/slide1.jpg" alt="Carro esportivo">
        <img src="./images/slide2.jpg" alt="Carro de luxo">
        <img src="./images/slide3.jpg" alt="Carro premium">
    </div>

    <section class="sobre-loja container">
        <h2>Sobre a loja</h2>
        <p>
            Bem-vindo à EBAC Motors. Trabalhamos com veículos de alta qualidade,
            oferecendo conforto, segurança e tecnologia para nossos clientes.
        </p>
    </section>

    <section class="container">
        <h2>Formulário de compra</h2>
        <form id="form-compra">
            <div class="form-campo">
                <label for="nome">Nome completo</label>
                <input type="text" id="nome" name="nome">
            </div>

            <div class="form-campo">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email">
            </div>

            <div class="form-campo">
                <label for="telefone">Telefone</label>
                <input type="text" id="telefone" name="telefone">
            </div>

            <div class="form-campo">
                <label for="cpf">CPF</label>
                <input type="text" id="cpf" name="cpf">
            </div>

            <div class="form-campo">
                <label for="endereco">Endereço completo</label>
                <input type="text" id="endereco" name="endereco">
            </div>

            <div class="form-campo">
                <label for="cep">CEP</label>
                <input type="text" id="cep" name="cep">
            </div>

            <button type="submit">Enviar pedido</button>
        </form>
    </section>

    <script src="./lib/jquery/jquery-3.7.1.min.js"></script>
    <script src="./lib/jquery.mask/jquery.mask.min.js"></script>
    <script src="./lib/jquery.validate/jquery.validate.min.js"></script>
    <script src="./lib/slick/slick.min.js"></script>
    <script src="./js/main.js"></script>
</body>
</html>
